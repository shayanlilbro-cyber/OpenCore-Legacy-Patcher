name: Build OpenCore Legacy Patcher (Tahoe)

on:
  push:
   workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔍 FIND THE REAL FILE LOCATION
      - name: Locate build script
        run: |
          find . -name "build.py"
          find . -name "*.py" | head -30
