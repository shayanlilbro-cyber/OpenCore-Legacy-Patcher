name: Build OpenCore Legacy Patcher (Tahoe)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: List repository files
        run: |
          ls -R  # This will print the full file structure for debugging

      - name: Run build script
        run: |
          python build.py  # Adjust this after seeing the file structure
