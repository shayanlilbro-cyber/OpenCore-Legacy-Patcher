name: Build OpenCore Legacy Patcher (Tahoe)

on:
  push:
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # macOS Sonoma runner

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Make sure you have this file

      # Step 4: Run the build script
      - name: Run build script
        run: |
          python build.py  # Use your actual build script here

      # Step 5: Create a dist folder if it doesn’t exist
      - name: Create dist folder
        run: mkdir -p dist

      # Step 6: Move output files into dist
      - name: Collect build output
        run: |
          # Example: if your build outputs a file like 'OCLP.app' or a folder 'build'
          cp -R OCLP.app dist/ 2>/dev/null || true
          cp -R build dist/ 2>/dev/null || true
          # Add more specific files or folders if needed

      # Step 7: Upload the dist folder as an artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCLP-Tahoe-Build
          path: dist/
