name: Build OpenCore Legacy Patcher (Tahoe)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Use macOS Sonoma runner

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Use Python 3.11 (adjust if needed)

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Ensure you have a requirements.txt

      # Step 4: Build OpenCore Legacy Patcher
      - name: Run build script
        run: |
          python main.py  # Adjust if your build script is different

      # Step 5: Create a dist folder if not created
      - name: Create dist folder
        run: mkdir -p dist

      # Step 6: Move output files into dist folder
      - name: Collect build output
        run: |
          # Copy only specific build artifacts to avoid recursion
          cp -R *.app dist/ 2>/dev/null || true
          cp -R build dist/ 2>/dev/null || true
          # Add any other specific directories or files if needed

      # Step 7: Upload the dist folder as an artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCLP-Tahoe-Build
          path: dist/
   
