name: Build OpenCore Legacy Patcher (Tahoe)

on:
  push:
      paths-ignore:
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run build (IMPORTANT FIX HERE)
      - name: Run build script
        run: |
          cd OpenCore-Legacy-Patcher
          python build.py

      # 5. Create artifact folder
      - name: Create dist folder
        run: mkdir -p dist

      # 6. Collect output safely
      - name: Collect build output
        run: |
          cp -R OpenCore-Legacy-Patcher/*.app dist/ 2>/dev/null || true
          cp -R OpenCore-Legacy-Patcher/build dist/ 2>/dev/null || true

      # 7. Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OCLP-Tahoe-Build
          path: dist/
